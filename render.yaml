databases:
  - name: ewaste-db
    databaseName: ewaste
    user: ewaste_user
    plan: free

services:
  - type: web
    name: ewaste-web
    env: python
    plan: free
    buildCommand: "./build.sh"
    startCommand: "cd waste_management && gunicorn waste_management.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ewaste-db
          property: connectionString
      - key: DEBUG
        value: "False"
      - key: PYTHON_VERSION
        value: "3.11.0"
